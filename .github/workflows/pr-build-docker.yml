name: Docker PR Build

on:
  pull_request:
    types: [synchronize, labeled, unlabeled] # PR 更新或标签变化时触发

# 确保同一 PR 同一时间只运行一个相同的 workflow,取消正在进行的旧的运行
concurrency:
  group: pr-${{ github.event.pull_request.number }}-${{ github.workflow }}
  cancel-in-progress: true

# Add default permissions
permissions:
  contents: read
  pull-requests: write
  packages: write

env:
  REGISTRY_IMAGE: ghcr.io/zhouguanyang/lobehub
  PR_TAG_PREFIX: pr-

jobs:
  build:
    name: Build linux/amd64 Docker Image
    # 添加 PR label 触发条件,只有添加了 trigger:build-docker 标签的 PR 才会触发构建
    # 只为非 fork 的 PR 构建/发布（fork 的 PR 没有 secrets 写权限）
    if: >
      contains(github.event.pull_request.labels.*.name, 'trigger:build-docker') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # 确保检出的是 PR head commit，而不是 merge commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 为 PR 生成特殊的 tag,使用 PR 的实际 commit SHA
      - name: Generate PR metadata
        id: pr_meta
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          sanitized_branch="$(echo "${BRANCH_NAME}" | sed -E 's/[^a-zA-Z0-9_.-]+/-/g')"
          commit_sha_short="${HEAD_SHA:0:7}"
          echo "pr_tag=${sanitized_branch}-${commit_sha_short}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${commit_sha_short}" >> "$GITHUB_OUTPUT"
          echo "Docker tag: ${sanitized_branch}-${commit_sha_short}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ env.PR_TAG_PREFIX }}${{ steps.pr_meta.outputs.pr_tag }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SHA=${{ steps.pr_meta.outputs.commit_sha }}
          push: true

      - name: Inspect image
        shell: bash
        run: |
          docker buildx imagetools inspect "${{ env.REGISTRY_IMAGE }}:${{ env.PR_TAG_PREFIX }}${{ steps.pr_meta.outputs.pr_tag }}"

      - name: Comment on PR with Docker build info
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prComment = require('${{ github.workspace }}/.github/scripts/docker-pr-comment.js');
            const result = await prComment({
              github,
              context,
              dockerMetaJson: ${{ toJSON(steps.meta.outputs.json) }},
              image: "${{ env.REGISTRY_IMAGE }}",
              version: "${{ env.PR_TAG_PREFIX }}${{ steps.pr_meta.outputs.pr_tag }}",
              dockerhubUrl: "https://github.com/zhouguanyang/lobehub/pkgs/container/lobehub",
              platforms: "linux/amd64",
            });
            core.info(`Status: ${result.updated ? 'Updated' : 'Created'}, ID: ${result.id}`);
